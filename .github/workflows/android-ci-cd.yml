name: Android CI/CD

on:
  push:
    branches:
      - feat/cicd-pipeline
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      apk-name: ${{ steps.build.outputs.apk-name }}
      environment: ${{ steps.vars.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine environment
        id: vars
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            ENV_SUFFIX="production"
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            ENV_SUFFIX="staging"
          fi
          BUILD_NAME="mum-mentor-$ENV_SUFFIX-$(date +'%Y%m%d-%H%M%S')"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV

      - name: Build Android APK with EAS
        id: build
        run: |
          eas whoami || eas login --token ${{ secrets.EXPO_TOKEN }}
          npx eas build --platform android --profile ${{ steps.vars.outputs.environment }} --non-interactive --output-dir ./build
          APK_PATH=$(find ./build -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found!"
            exit 1
          fi
          cp "$APK_PATH" "${{ env.BUILD_NAME }}.apk"
          echo "apk-name=${{ env.BUILD_NAME }}.apk" >> $GITHUB_OUTPUT

      - name: Upload APK as GitHub Artifact (for staging only)
        if: steps.vars.outputs.environment == 'staging'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: ${{ env.BUILD_NAME }}.apk
          retention-days: 30

      - name: Upload to Google Drive (manual trigger for production)
        if: steps.vars.outputs.environment == 'production'
        uses: logickoder/g-drive-upload@main
        with:
          authType: 'oauth'
          clientId: ${{ secrets.GOOGLE_CLIENT_ID }}
          clientSecret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          refreshToken: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          filename: '${{ env.BUILD_NAME }}.apk'
          folderId: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          overwrite: 'true'

      - name: Upload to Appetize.io (manual trigger for production)
        if: steps.vars.outputs.environment == 'production'
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://${{ secrets.APPETIZE_API_TOKEN }}@api.appetize.io/v1/apps" \
            -F "file=@${{ env.BUILD_NAME }}.apk" \
            -F "platform=android" \
            -F "note=Mum Mentor Mobile - ${{ steps.vars.outputs.environment }} Build $(date +'%Y-%m-%d %H:%M')")
          echo "Appetize response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"publicKey"'; then
            PUBLIC_KEY=$(echo "$RESPONSE" | grep -o '"publicKey":"[^"]*' | cut -d'"' -f4)
            echo "Appetize URL: https://appetize.io/app/$PUBLIC_KEY"
          fi
