name: iOS CI/CD

on:
  push:
    branches:
      - feat/ci-cd-pipeline
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    outputs:
      ipa-name: ${{ steps.build.outputs.ipa-name }}
      environment: ${{ steps.vars.outputs.environment }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Setup Expo
      uses: expo/expo-github-action@v8
      with:
        expo-version: latest
        token: ${{ secrets.EXPO_TOKEN }}

    - name: Determine environment
      id: vars
      run: |
        if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
          echo "environment=production" >> $GITHUB_OUTPUT
          ENV_SUFFIX="production"
        else
          echo "environment=dev" >> $GITHUB_OUTPUT
          ENV_SUFFIX="dev"
        fi
        BUILD_NAME="mum-mentor-ios-$ENV_SUFFIX-$(date +'%Y%m%d-%H%M%S')"
        echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV

    - name: Build iOS IPA with EAS
      id: build
      run: |
        echo "Building iOS IPA for ${{ steps.vars.outputs.environment }}..."
        npx eas build --platform ios --profile ${{ steps.vars.outputs.environment }} --non-interactive --output-dir ./build
        IPA_PATH=$(find ./build -name "*.ipa" | head -1)
        if [ -z "$IPA_PATH" ]; then
          echo "ERROR: IPA not found!"
          exit 1
        fi
        cp "$IPA_PATH" "${{ env.BUILD_NAME }}.ipa"
        echo "ipa-name=${{ env.BUILD_NAME }}.ipa" >> $GITHUB_OUTPUT

    - name: Upload IPA as GitHub Artifact (dev only)
      if: steps.vars.outputs.environment == 'dev'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BUILD_NAME }}
        path: ${{ env.BUILD_NAME }}.ipa
        retention-days: 30

    - name: Upload to Appetize.io (manual trigger only)
      if: steps.vars.outputs.environment != 'dev'
      run: |
        RESPONSE=$(curl -s -X POST \
          "https://${{ secrets.APPETIZE_API_TOKEN }}@api.appetize.io/v1/apps" \
          -F "file=@${{ env.BUILD_NAME }}.ipa" \
          -F "platform=ios" \
          -F "note=Mum Mentor Mobile - ${{ steps.vars.outputs.environment }} Build $(date +'%Y-%m-%d %H:%M')")
        echo "Appetize response: $RESPONSE"
        if echo "$RESPONSE" | grep -q '"publicKey"'; then
          PUBLIC_KEY=$(echo "$RESPONSE" | grep -o '"publicKey":"[^"]*' | cut -d'"' -f4)
          echo "Appetize URL: https://appetize.io/app/$PUBLIC_KEY"
        fi
