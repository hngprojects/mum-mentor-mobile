name: Expo Mobile CI/CD - Test

on:
  push:
    branches: [feat/cicd-pipeline]
  pull_request:
    branches: [feat/cicd-pipeline]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  NODE_VERSION: '18'

jobs:
  validate-expo-setup:
    name: Validate Expo Project
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.vars.outputs.environment }}
      expo-valid: ${{ steps.expo-validation.outputs.valid }}
      project-id: ${{ steps.expo-validation.outputs.project-id }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Determine environment
      id: vars
      run: |
        if [[ "${{ github.event.inputs.environment }}" != "" ]]; then
          echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
        else
          echo "environment=staging" >> $GITHUB_OUTPUT
        fi

    - name: Validate Expo project structure
      id: expo-validation
      run: |
        echo "Validating Expo project structure..."
        
        # Check critical Expo files
        test -f package.json && echo "PASS: package.json exists" || echo "FAIL: package.json missing"
        test -f app.json && echo "PASS: app.json exists" || echo "FAIL: app.json missing"
        test -f eas.json && echo "PASS: eas.json exists" || echo "FAIL: eas.json missing"
        test -f tsconfig.json && echo "PASS: tsconfig.json exists" || echo "FAIL: tsconfig.json missing"
        
        # Check Expo-specific directories
        test -d src && echo "PASS: src directory exists" || echo "FAIL: src directory missing"
        test -d src/app && echo "PASS: src/app directory exists" || echo "FAIL: src/app directory missing"
        test -d plugins && echo "PASS: plugins directory exists" || echo "FAIL: plugins directory missing"
        
        # Extract project ID from app.json
        if [ -f "app.json" ]; then
          PROJECT_ID=$(node -e "console.log(require('./app.json').expo.extra?.eas?.projectId || 'NOT_FOUND')")
          echo "project-id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "Expo Project ID: $PROJECT_ID"
        else
          echo "project-id=NOT_FOUND" >> $GITHUB_OUTPUT
        fi
        
        # Set validation result
        if [ -f "package.json" ] && [ -f "app.json" ] && [ -f "eas.json" ] && [ -d "src" ] && [ -d "plugins" ]; then
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "PASS: All Expo project files present"
        else
          echo "valid=false" >> $GITHUB_OUTPUT
          echo "FAIL: Missing critical Expo files"
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: |
        echo "Installing dependencies..."
        npm ci
        echo "Dependencies installed successfully"

    - name: Validate Expo configuration
      run: |
        echo "Validating Expo configuration..."
        npx expo config --non-interactive
        echo "Expo configuration is valid"

  test-expo-android-build:
    name: Test Expo Android Build
    runs-on: ubuntu-latest
    needs: validate-expo-setup
    if: needs.validate-expo-setup.outputs.expo-valid == 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup EAS CLI
      run: |
        echo "Installing EAS CLI..."
        npm install -g @expo/eas-cli
        echo "EAS CLI version: $(eas --version)"

    - name: Validate Android build configuration
      run: |
        echo "Expo Android Build Simulation"
        echo "=============================="
        echo "Environment: ${{ needs.validate-expo-setup.outputs.environment }}"
        echo "Expo Project ID: ${{ needs.validate-expo-setup.outputs.project-id }}"
        echo "EXPO_TOKEN: ${{ secrets.EXPO_TOKEN != '' && 'SET' || 'MISSING' }}"
        
        # Configure EAS build
        echo "Configuring EAS build..."
        eas build:configure --non-interactive
        
        # Check available build profiles
        echo "Available build profiles:"
        node -e "console.log(JSON.stringify(require('./eas.json').build, null, 2))" || echo "Could not read eas.json build profiles"
        
        # Simulate build command
        echo "Build command that would run:"
        echo "eas build --platform android --profile ${{ needs.validate-expo-setup.outputs.environment }} --non-interactive --wait"
        echo "Android build simulation completed successfully"

    - name: Create Android build manifest
      run: |
        echo "Creating Android build simulation manifest..."
        cat > android-build-simulation.json << EOF
        {
          "platform": "android",
          "environment": "${{ needs.validate-expo-setup.outputs.environment }}",
          "projectId": "${{ needs.validate-expo-setup.outputs.project-id }}",
          "status": "ready_for_build",
          "timestamp": "$(date -u -Iseconds)",
          "buildCommand": "eas build --platform android --profile ${{ needs.validate-expo-setup.outputs.environment }} --non-interactive",
          "artifacts": ["apk", "aab"],
          "easCliVersion": "$(eas --version)"
        }
        EOF
        
        echo "Android build simulation manifest created"

    - name: Upload Android simulation artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-expo-build-simulation
        path: android-build-simulation.json
        retention-days: 7

  test-expo-ios-build:
    name: Test Expo iOS Build
    runs-on: macos-latest
    needs: validate-expo-setup
    if: needs.validate-expo-setup.outputs.expo-valid == 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup EAS CLI
      run: |
        echo "Installing EAS CLI..."
        npm install -g @expo/eas-cli
        echo "EAS CLI version: $(eas --version)"

    - name: Validate iOS build environment
      run: |
        echo "Expo iOS Build Simulation"
        echo "=========================="
        echo "Environment: ${{ needs.validate-expo-setup.outputs.environment }}"
        echo "Expo Project ID: ${{ needs.validate-expo-setup.outputs.project-id }}"
        echo "EXPO_TOKEN: ${{ secrets.EXPO_TOKEN != '' && 'SET' || 'MISSING' }}"
        
        # Check macOS environment
        echo "macOS Version: $(sw_vers -productVersion)"
        echo "Xcode Select: $(xcode-select -p)"
        
        # Configure EAS build
        echo "Configuring EAS build..."
        eas build:configure --non-interactive
        
        # Check available build profiles
        echo "Available build profiles:"
        node -e "console.log(JSON.stringify(require('./eas.json').build, null, 2))" || echo "Could not read eas.json build profiles"
        
        # Simulate build command
        echo "Build command that would run:"
        echo "eas build --platform ios --profile ${{ needs.validate-expo-setup.outputs.environment }} --non-interactive --wait"
        echo "iOS build simulation completed successfully"

    - name: Create iOS build manifest
      run: |
        echo "Creating iOS build simulation manifest..."
        cat > ios-build-simulation.json << EOF
        {
          "platform": "ios",
          "environment": "${{ needs.validate-expo-setup.outputs.environment }}",
          "projectId": "${{ needs.validate-expo-setup.outputs.project-id }}",
          "status": "ready_for_build",
          "timestamp": "$(date -u -Iseconds)",
          "buildCommand": "eas build --platform ios --profile ${{ needs.validate-expo-setup.outputs.environment }} --non-interactive",
          "artifacts": ["ipa", "simulator"],
          "easCliVersion": "$(eas --version)"
        }
        EOF
        
        echo "iOS build simulation manifest created"

    - name: Upload iOS simulation artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-expo-build-simulation
        path: ios-build-simulation.json
        retention-days: 7

  expo-build-summary:
    name: Expo CI/CD Test Summary
    runs-on: ubuntu-latest
    needs: [validate-expo-setup, test-expo-android-build, test-expo-ios-build]
    if: always()
    
    steps:
    - name: Download simulation artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-expo-build-simulation'
        path: ./expo-artifacts

    - name: Create Expo-specific summary
      run: |
        echo "## Expo Mobile CI/CD Pipeline Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Expo Project Structure Validation:**" >> $GITHUB_STEP_SUMMARY
        echo "- package.json: Present" >> $GITHUB_STEP_SUMMARY
        echo "- app.json: Present" >> $GITHUB_STEP_SUMMARY
        echo "- eas.json: Present" >> $GITHUB_STEP_SUMMARY
        echo "- src/ directory: Present" >> $GITHUB_STEP_SUMMARY
        echo "- plugins/ directory: Present" >> $GITHUB_STEP_SUMMARY
        echo "- Project ID: ${{ needs.validate-expo-setup.outputs.project-id }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### Build Simulation Results" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | Status | Environment |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|-------------|" >> $GITHUB_STEP_SUMMARY
        echo "| Android | ${{ needs.test-expo-android-build.result }} | ${{ needs.validate-expo-setup.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
        echo "| iOS | ${{ needs.test-expo-ios-build.result }} | ${{ needs.validate-expo-setup.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### Required Setup" >> $GITHUB_STEP_SUMMARY
        echo "- EXPO_TOKEN: ${{ secrets.EXPO_TOKEN != '' && 'SET' || 'MISSING - Get from https://expo.dev/settings/access-tokens' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### Next Steps for Production" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ needs.validate-expo-setup.result }}" == "success" && "${{ needs.test-expo-android-build.result }}" == "success" && "${{ needs.test-expo-ios-build.result }}" == "success" ]]; then
          echo "SUCCESS: Expo Pipeline Validation PASSED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To activate real builds, merge to main/staging and ensure:" >> $GITHUB_STEP_SUMMARY
          echo "1. EXPO_TOKEN secret is set in GitHub" >> $GITHUB_STEP_SUMMARY
          echo "2. Apple Developer Account is linked to EAS" >> $GITHUB_STEP_SUMMARY
          echo "3. Google Play Account is linked to EAS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Real build commands:" >> $GITHUB_STEP_SUMMARY
          echo "```bash" >> $GITHUB_STEP_SUMMARY
          echo "# Android" >> $GITHUB_STEP_SUMMARY
          echo "eas build --platform android --profile ${{ needs.validate-expo-setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# iOS" >> $GITHUB_STEP_SUMMARY
          echo "eas build --platform ios --profile ${{ needs.validate-expo-setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
        else
          echo "FAILED: Pipeline validation needs fixes" >> $GITHUB_STEP_SUMMARY
          echo "Check the job logs above for specific issues with your Expo project structure." >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Expo CLI Version: $(npx expo --version 2>/dev/null || echo 'Not installed')" >> $GITHUB_STEP_SUMMARY
        echo "Test completed at: $(date -u)" >> $GITHUB_STEP_SUMMARY